{% extends "base.html" %}
{% set active_page = 'admin_sources' %}
{% block content %}
<div class="flex-1 overflow-y-auto p-6">
  <div class="flex items-center justify-between mb-6">
    <h1 class="text-lg font-bold text-slate-800">소스 관리</h1>
    <button onclick="document.getElementById('add-form').classList.toggle('hidden')" class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">+ 소스 추가</button>
  </div>
  <div id="add-form" class="hidden bg-white border border-slate-200 rounded-xl p-4 mb-4">
    <form method="post" action="/admin/sources" class="grid grid-cols-2 gap-3">
      <input name="name" placeholder="소스 이름" required class="border border-slate-200 rounded px-3 py-2 text-sm">
      <input name="url" placeholder="URL" required class="border border-slate-200 rounded px-3 py-2 text-sm">
      <select name="source_type" class="border border-slate-200 rounded px-3 py-2 text-sm"><option value="scraper">Scraper</option><option value="rss">RSS</option></select>
      <select name="category" class="border border-slate-200 rounded px-3 py-2 text-sm"><option value="article">기사</option><option value="paper">논문</option><option value="blog">블로그</option></select>
      <select name="country" class="border border-slate-200 rounded px-3 py-2 text-sm"><option value="kr">한국</option><option value="global">해외</option></select>
      <input name="weight" type="number" value="5" min="1" max="10" class="border border-slate-200 rounded px-3 py-2 text-sm">
      <div class="col-span-2"><button type="submit" class="px-4 py-2 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">추가</button></div>
    </form>
  </div>
  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="px-4 py-3 text-left">이름</th><th class="px-4 py-3 text-left">URL</th><th class="px-4 py-3 text-center">유형</th><th class="px-4 py-3 text-center">카테고리</th><th class="px-4 py-3 text-center">가중치</th><th class="px-4 py-3 text-center">작업</th></tr></thead>
      <tbody class="divide-y">
        {% for s in sources %}
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3 font-medium">{{ s.name }}</td>
          <td class="px-4 py-3 text-slate-500 truncate max-w-xs">{{ s.url }}</td>
          <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs bg-slate-100">{{ s.type }}</span></td>
          <td class="px-4 py-3 text-center">{{ s.category }}</td>
          <td class="px-4 py-3 text-center">{{ s.weight }}</td>
          <td class="px-4 py-3 text-center"><form method="post" action="/admin/sources/{{ s.id }}/delete" onsubmit="return confirm('삭제?')"><button class="text-red-500 text-xs">삭제</button></form></td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
