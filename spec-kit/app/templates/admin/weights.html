{% extends "base.html" %}
{% set active_page = 'admin_weights' %}
{% block content %}
<div class="flex-1 overflow-y-auto p-6">
  <h1 class="text-lg font-bold text-slate-800 mb-2">중요도 가중치 관리</h1>
  <p class="text-sm text-slate-500 mb-6">게시물 중요도 점수 산정에 사용되는 가중치를 조정합니다.</p>
  <div class="grid gap-4 max-w-xl">
    {% for w in weights %}
    <form method="post" action="/admin/scoring-weights/{{ w.key }}" class="bg-white border border-slate-200 rounded-xl p-4 flex items-center gap-4">
      <div class="flex-1"><div class="font-medium text-slate-800">{{ w.key }}</div><div class="text-xs text-slate-500">{{ w.description or '' }}</div></div>
      <input name="weight" type="number" step="0.1" min="0" max="10" value="{{ w.weight }}" class="w-20 border border-slate-200 rounded px-2 py-1 text-sm text-center">
      <button type="submit" class="px-3 py-1 bg-blue-600 text-white text-sm rounded hover:bg-blue-700">저장</button>
    </form>
    {% endfor %}
  </div>
</div>
{% endblock %}
