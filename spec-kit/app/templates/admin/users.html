{% extends "base.html" %}
{% set active_page = 'admin_users' %}
{% block content %}
<div class="flex-1 overflow-y-auto p-6">
  <h1 class="text-lg font-bold text-slate-800 mb-6">사용자 관리</h1>
  <div class="bg-white border border-slate-200 rounded-xl overflow-hidden">
    <table class="w-full text-sm">
      <thead class="bg-slate-50"><tr><th class="px-4 py-3 text-left">이메일</th><th class="px-4 py-3 text-left">닉네임</th><th class="px-4 py-3 text-center">역할</th><th class="px-4 py-3 text-center">상태</th><th class="px-4 py-3 text-center">작업</th></tr></thead>
      <tbody class="divide-y">
        {% for u in users %}
        <tr class="hover:bg-slate-50">
          <td class="px-4 py-3">{{ u.email }}</td>
          <td class="px-4 py-3 font-medium">{{ u.nickname }}</td>
          <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs {{ 'bg-purple-100 text-purple-700' if u.role == 'admin' else 'bg-slate-100' }}">{{ u.role }}</span></td>
          <td class="px-4 py-3 text-center"><span class="px-2 py-0.5 rounded text-xs {{ 'bg-green-100 text-green-700' if u.is_active else 'bg-red-100 text-red-700' }}">{{ '활성' if u.is_active else '비활성' }}</span></td>
          <td class="px-4 py-3 text-center">
            {% if u.id != current_user.id %}
            <div class="flex items-center justify-center gap-2">
              <form method="post" action="/admin/users/{{ u.id }}/role"><select name="role" onchange="this.form.submit()" class="text-xs border rounded px-1 py-0.5"><option value="user" {{ 'selected' if u.role == 'user' }}>user</option><option value="admin" {{ 'selected' if u.role == 'admin' }}>admin</option></select></form>
              <form method="post" action="/admin/users/{{ u.id }}/active"><input type="hidden" name="is_active" value="{{ 'false' if u.is_active else 'true' }}"><button class="text-xs px-2 py-0.5 rounded border {{ 'border-red-200 text-red-600' if u.is_active else 'border-green-200 text-green-600' }}">{{ '비활성화' if u.is_active else '활성화' }}</button></form>
            </div>
            {% else %}<span class="text-xs text-slate-400">본인</span>{% endif %}
          </td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
