<div class="space-y-4">
  {% if article.user_tags_list %}
  <div class="flex flex-wrap gap-2">
    {% for tag in article.user_tags_list %}
    <span class="rounded-full bg-amber-100 px-3 py-1 text-xs font-medium text-amber-800">{{ tag }}</span>
    {% endfor %}
  </div>
  {% endif %}

  {% if article.memo_preview %}
  <div class="rounded-2xl bg-slate-50 px-4 py-3 text-sm leading-6 text-slate-600">
    <span class="font-semibold text-slate-800">메모</span>
    <p class="mt-1">"{{ article.memo_preview }}"</p>
  </div>
  {% endif %}

  <div class="flex flex-wrap gap-2">
    <form hx-post="/articles/{{ article.id }}/bookmark" hx-target="#archive-panel-{{ article.id }}" hx-swap="outerHTML">
      <button class="rounded-2xl {% if article.is_bookmarked %}bg-amber-500 text-white{% else %}bg-slate-100 text-slate-700{% endif %} px-4 py-2 text-sm font-semibold">
        {{ "북마크 해제" if article.is_bookmarked else "북마크" }}
      </button>
    </form>
    <a href="/articles/{{ article.id }}" class="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white">상세 보기</a>
  </div>

  <div class="grid gap-3 xl:grid-cols-2">
    <form class="rounded-[1.5rem] border border-slate-200 bg-white p-4" hx-post="/articles/{{ article.id }}/memo" hx-target="#archive-panel-{{ article.id }}" hx-swap="outerHTML">
      <label class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">메모</label>
      <textarea name="memo" rows="3" class="mt-3 w-full rounded-2xl border border-slate-200 px-3 py-3 text-sm text-slate-700 focus:outline-none">{{ article.memo_text }}</textarea>
      <button class="mt-3 rounded-2xl bg-teal-600 px-4 py-2 text-sm font-semibold text-white">메모 저장</button>
    </form>

    <form class="rounded-[1.5rem] border border-slate-200 bg-white p-4" hx-post="/articles/{{ article.id }}/tags" hx-target="#archive-panel-{{ article.id }}" hx-swap="outerHTML">
      <label class="text-xs font-semibold uppercase tracking-[0.24em] text-slate-500">커스텀 태그</label>
      <input type="text" name="user_tags" value="{{ article.user_tags_list|join(', ') }}" placeholder="예: 꼭읽기, 실험, 구현아이디어" class="mt-3 w-full rounded-2xl border border-slate-200 px-3 py-3 text-sm text-slate-700 focus:outline-none">
      <button class="mt-3 rounded-2xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white">태그 저장</button>
    </form>
  </div>
</div>
