{% extends "base.html" %}
{% block content %}
<section class="glass-panel rounded-[2rem] px-5 py-6 sm:px-8">
  <div class="flex flex-col gap-4 border-b border-slate-200 pb-6 lg:flex-row lg:items-end lg:justify-between">
    <div>
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-teal-700">Saved Queue</p>
      <h2 class="mt-3 text-3xl font-semibold tracking-tight text-slate-950">북마크</h2>
      <p class="mt-2 text-sm leading-6 text-slate-600">저장한 글만 모아 보고, 메모가 있는 항목을 우선해서 정리합니다.</p>
    </div>
    <div class="flex flex-wrap gap-2">
      <a href="/bookmarks?country=all" class="rounded-full px-4 py-2 text-sm font-medium {% if selected_country == 'all' %}bg-slate-950 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">전체</a>
      <a href="/bookmarks?country=kr" class="rounded-full px-4 py-2 text-sm font-medium {% if selected_country == 'kr' %}bg-slate-950 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">한국</a>
      <a href="/bookmarks?country=global" class="rounded-full px-4 py-2 text-sm font-medium {% if selected_country == 'global' %}bg-slate-950 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">해외</a>
    </div>
  </div>
</section>

<section class="mt-6 space-y-4">
  {% for article in articles %}
    {% include "_article_card.html" %}
  {% else %}
    <div class="glass-panel rounded-[2rem] px-8 py-10 text-center">
      <h3 class="text-xl font-semibold text-slate-900">북마크된 글이 없습니다.</h3>
      <p class="mt-2 text-sm text-slate-600">피드에서 저장해두고 싶은 글을 북마크해보세요.</p>
    </div>
  {% endfor %}
</section>
{% endblock %}
