version: "3.9"

services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: ai_insights
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
    command: uv run uvicorn app.main:app --host 0.0.0.0 --port 8000
    env_file:
      - .env.example
    environment:
      AINSIGHTS_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_insights
      AINSIGHTS_REDIS_URL: redis://redis:6379/0
      AINSIGHTS_SOURCES_PATH: /app/sources.json
    volumes:
      - ./backend:/app
      - ./sources.json:/app/sources.json
    depends_on:
      - db
      - redis
    ports:
      - "8000:8000"

  worker:
    build:
      context: ./backend
    command: uv run celery -A app.worker.celery_app worker -l info
    env_file:
      - .env.example
    environment:
      AINSIGHTS_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_insights
      AINSIGHTS_REDIS_URL: redis://redis:6379/0
      AINSIGHTS_SOURCES_PATH: /app/sources.json
    volumes:
      - ./backend:/app
      - ./sources.json:/app/sources.json
    depends_on:
      - api
      - redis

  beat:
    build:
      context: ./backend
    command: uv run celery -A app.worker.celery_app beat -l info
    env_file:
      - .env.example
    environment:
      AINSIGHTS_DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/ai_insights
      AINSIGHTS_REDIS_URL: redis://redis:6379/0
      AINSIGHTS_SOURCES_PATH: /app/sources.json
    volumes:
      - ./backend:/app
      - ./sources.json:/app/sources.json
    depends_on:
      - worker

  web:
    build:
      context: ./web
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000/api
    volumes:
      - ./web:/app
    depends_on:
      - api
    ports:
      - "3000:3000"

volumes:
  postgres-data:

