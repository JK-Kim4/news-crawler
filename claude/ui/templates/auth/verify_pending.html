{% extends "base.html" %}
{% block content %}
<div class="flex-1 flex items-center justify-center p-6">
  <div class="w-full max-w-sm text-center">
    <div class="text-4xl mb-4">✉️</div>
    <h1 class="text-xl font-bold text-slate-900 mb-2">이메일을 확인해주세요</h1>
    <p class="text-sm text-slate-600">
      <strong>{{ email }}</strong>으로 인증 메일을 발송했습니다.<br>
      메일의 링크를 클릭하면 가입이 완료됩니다.
    </p>
    <form method="post" action="/auth/resend-verification" class="mt-4">
      <input type="hidden" name="email" value="{{ email }}">
      <button type="submit" class="text-sm text-blue-600 hover:underline">인증 메일 재발송</button>
    </form>
    <div class="mt-4">
      <a href="/auth/login" class="text-sm text-blue-600 hover:underline">로그인 페이지로 이동</a>
    </div>
  </div>
</div>
{% endblock %}
