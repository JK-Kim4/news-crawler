{% extends "base.html" %}
{% block content %}
<section class="glass-panel rounded-[2rem] px-5 py-5 sm:px-8 sm:py-7">
  <div class="flex flex-col gap-5 border-b border-slate-200 pb-6 lg:flex-row lg:items-end lg:justify-between">
    <div class="space-y-3">
      <p class="text-xs font-semibold uppercase tracking-[0.3em] text-teal-700">Archive Feed</p>
      <div>
        <h2 class="text-3xl font-semibold tracking-tight text-slate-900">AI 기술 피드</h2>
        <p class="mt-2 text-sm leading-6 text-slate-600">스코어와 최신성을 기준으로 아티클을 정리하고, 한국/해외 소스를 빠르게 오갈 수 있습니다.</p>
      </div>
      <div class="flex flex-wrap gap-2">
        <a href="/?country=all&sort={{ sort }}" class="rounded-full px-4 py-2 text-sm font-medium {% if selected_country == 'all' %}bg-slate-950 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">전체</a>
        <a href="/?country=kr&sort={{ sort }}" class="rounded-full px-4 py-2 text-sm font-medium {% if selected_country == 'kr' %}bg-slate-950 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">한국</a>
        <a href="/?country=global&sort={{ sort }}" class="rounded-full px-4 py-2 text-sm font-medium {% if selected_country == 'global' %}bg-slate-950 text-white{% else %}bg-slate-100 text-slate-600{% endif %}">해외</a>
      </div>
    </div>

    <div class="flex flex-col gap-3 sm:flex-row sm:items-center">
      <form action="/search" method="get" class="flex rounded-2xl border border-slate-200 bg-white p-1 shadow-sm">
        <input type="hidden" name="country" value="{{ selected_country }}">
        <input type="text" name="q" placeholder="제목과 본문 검색" class="w-full min-w-[220px] rounded-2xl border-0 bg-transparent px-4 py-2 text-sm focus:outline-none">
        <button class="rounded-2xl bg-teal-600 px-4 py-2 text-sm font-semibold text-white">검색</button>
      </form>
      <button
        class="inline-flex items-center justify-center rounded-2xl bg-slate-950 px-4 py-3 text-sm font-semibold text-white"
        hx-post="/api/crawl"
        hx-target="#crawl-result"
        hx-indicator="#crawl-spinner"
        hx-disabled-elt="this"
        hx-on::after-request="window.location.reload()">
        지금 크롤링
      </button>
    </div>
  </div>

  <div class="mt-5 flex flex-col gap-3 xl:flex-row xl:items-center xl:justify-between">
    <form method="get" class="grid gap-3 md:grid-cols-4">
      <input type="hidden" name="country" value="{{ selected_country }}">
      <select name="source_id" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700" onchange="this.form.submit()">
        <option value="">모든 소스</option>
        {% for source in sources %}
        <option value="{{ source.id }}" {% if selected_source_id == source.id %}selected{% endif %}>{{ source.name }}</option>
        {% endfor %}
      </select>
      <select name="sort" class="rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700" onchange="this.form.submit()">
        <option value="score" {% if sort == 'score' %}selected{% endif %}>스코어순</option>
        <option value="date" {% if sort == 'date' %}selected{% endif %}>최신순</option>
      </select>
      <label class="flex items-center gap-3 rounded-2xl border border-slate-200 bg-white px-4 py-3 text-sm text-slate-700">
        <input type="checkbox" name="unread" value="true" {% if unread_only %}checked{% endif %} onchange="this.form.submit()">
        안 읽은 것만
      </label>
      <div id="crawl-result" class="flex items-center text-sm text-slate-600"></div>
      <span id="crawl-spinner" class="htmx-indicator inline-flex items-center rounded-full bg-teal-50 px-3 py-2 text-xs font-semibold text-teal-700">크롤링 중...</span>
    </form>
  </div>
</section>

<section class="mt-6 space-y-4">
  {% for article in articles %}
    {% include "_article_card.html" %}
  {% else %}
    <div class="glass-panel rounded-[2rem] px-8 py-10 text-center">
      <h3 class="text-xl font-semibold text-slate-900">수집된 기사가 없습니다.</h3>
      <p class="mt-2 text-sm text-slate-600">크롤링을 실행하거나 필터를 완화해보세요.</p>
    </div>
  {% endfor %}
</section>
{% endblock %}
